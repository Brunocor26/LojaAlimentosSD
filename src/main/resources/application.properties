spring.application.name=lojasd

# Importar configurações locais (ficheiro gitignored com credenciais)
spring.config.import=optional:application-local.properties

# MariaDB — valores padrão substituídos pelo application-local.properties
spring.datasource.url=jdbc:mariadb://localhost:3306/lojasd_db
spring.datasource.username=lojasd_user
spring.datasource.password=lojasd_password_local
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Sessões HTTP
server.servlet.session.timeout=30m
