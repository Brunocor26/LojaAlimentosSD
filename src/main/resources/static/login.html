<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — FOOD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background: #fff; color: #000; display: flex; flex-direction: column; min-height: 100vh; padding: 2vw; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 50px; font-size: 14px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .logo { font-size: 24px; text-decoration: none; color: #000; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; }
        .caixa { width: 100%; max-width: 380px; }
        h1 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 20px; }
        input { width: 100%; border: none; border-bottom: 1px solid #000; padding: 8px 0; font-size: 14px; outline: none; background: transparent; }
        input:focus { border-bottom-color: #000; }
        button { width: 100%; margin-top: 36px; padding: 14px; background: #000; color: #fff; border: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        button:hover { background: #333; }
        .erro { margin-top: 16px; font-size: 12px; color: #c00; min-height: 18px; }
        .rodape-link { margin-top: 28px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; }
        .rodape-link a { color: #000; }
        footer { padding-top: 60px; text-align: center; font-size: 10px; text-transform: uppercase; color: #999; }
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo">FOOD</a>
    </header>

    <main>
        <div class="caixa">
            <h1>Entrar</h1>
            <form id="form-login">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">

                <button type="submit">Entrar</button>
            </form>
            <p class="erro" id="erro"></p>
            <p class="rodape-link">Ainda não tens conta? <a href="/registar.html">Registar</a></p>
        </div>
    </main>

    <footer>© 2026 FOOD INC</footer>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('erro').textContent = '';

            const resposta = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });

            if (resposta.ok) {
                window.location.href = '/index.html';
            } else {
                const dados = await resposta.json();
                document.getElementById('erro').textContent = dados.erro || 'Erro ao iniciar sessão.';
            }
        });
    </script>
</body>
</html>
