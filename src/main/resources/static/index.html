<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOD SHOP</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-direita { display: flex; align-items: center; gap: 24px; }
        #info-utilizador { display: none; align-items: center; gap: 12px; }
        #auth-botoes { display: flex; gap: 16px; }
        #auth-botoes a { text-decoration: none; color: #000; }
        #auth-botoes a:hover { text-decoration: underline; }
        #btn-logout { background: none; border: none; cursor: pointer; font-size: 14px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; padding: 0; }
    </style>
</head>
<body>

    <header>
        <a href="/index.html" class="logo">FOOD</a>
        <div class="nav-direita">
            <div id="info-utilizador">
                <span id="nome-utilizador"></span>
                <button id="btn-logout" onclick="fazerLogout()">Sair</button>
            </div>
            <div id="auth-botoes">
                <a href="/login.html">Entrar</a>
                <a href="/registar.html">Registar</a>
            </div>
            <div class="cart" id="cart-button">CART (<span id="cart-count">0</span>)</div>
        </div>
    </header>

    <!-- Modal do Carrinho -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-cart">&times;</span>
            <h2>O Teu Carrinho</h2>
            <div id="cart-items-list">
                <!-- Itens serão inseridos aqui -->
            </div>
            <div class="cart-total">
                Total: <span id="cart-total-value">0.00</span>€
            </div>
            <button id="checkout-btn" class="checkout-button">Finalizar Compra</button>
        </div>
    </div>

    <!-- Modal de Detalhes do Produto (Estilo Yeezy) -->
    <div id="product-modal" class="modal">
        <div class="product-modal-content">
            <span class="close" id="close-product">&times;</span>
            <div class="product-details-container">
                <div class="product-details-image">
                    <img id="modal-product-img" src="" alt="">
                </div>
                <div class="product-details-info">
                    <h1 id="modal-product-name"></h1>
                    <p id="modal-product-price"></p>
                    <p id="modal-product-stock"></p>
                    
                    <div class="quantity-selector">
                        <label for="quantity">QUANTIDADE:</label>
                        <div class="quantity-controls">
                            <button id="qty-minus">-</button>
                            <input type="number" id="product-quantity" value="1" min="1">
                            <button id="qty-plus">+</button>
                        </div>
                    </div>
                    
                    <button id="add-to-cart-btn" class="checkout-button">ADICIONAR AO CARRINHO</button>
                </div>
            </div>
        </div>
    </div>

    <main class="product-grid" id="grid-produtos">
    </main>

    <footer>© 2026 FOOD INC</footer>

    <script src="/js/auth.js"></script>
    <script src="script.js"></script>
    <script>
        verificarAutenticacao().then(utilizador => {
            if (utilizador) {
                document.getElementById('nome-utilizador').textContent = utilizador.nome;
                document.getElementById('info-utilizador').style.display = 'flex';
                document.getElementById('auth-botoes').style.display = 'none';
            }
        });
    </script>
</body>
</html>
