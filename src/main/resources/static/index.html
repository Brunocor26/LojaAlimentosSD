<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMIDA CLONE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding: 2vw;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 50px;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo {
            font-size: 24px;
            text-decoration: none;
            color: #000;
        }

        .cart {
            cursor: pointer;
        }

        /* Grelha de Produtos */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2vw;
        }

        .product {
            cursor: pointer;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Dica: PNG */
        .product-image img {
            width: 70%; 
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .product:hover .product-image img {
            transform: scale(1.05); 
        }

        /* Informação do Produto */
        .product-info {
            display: flex;
            justify-content: space-between;
            padding-top: 15px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .product-name {
            font-weight: bold;
        }

        .product-price {
            color: #666;
        }

        footer {
            margin-top: 100px;
            padding-bottom: 20px;
            text-align: center;
            font-size: 10px;
            text-transform: uppercase;
            color: #999;
        }
    </style>
</head>
