<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMIDA CLONE</title>
    <style>
        /* O CSS mantém-se igual ao de antes */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #ffffff; color: #000000; padding: 2vw; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 50px; font-size: 14px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .logo { font-size: 24px; text-decoration: none; color: #000; }
        .cart { cursor: pointer; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2vw; }
        .product { cursor: pointer; }
        .product-image { width: 100%; aspect-ratio: 1 / 1; background-color: #f5f5f5; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 70%; height: auto; object-fit: contain; transition: transform 0.3s ease; border-radius: 50%; }
        .product:hover .product-image img { transform: scale(1.05); }
        .product-info { display: flex; justify-content: space-between; padding-top: 15px; font-size: 12px; text-transform: uppercase; }
        .product-name { font-weight: bold; }
        .product-price { color: #666; }
        footer { margin-top: 100px; padding-bottom: 20px; text-align: center; font-size: 10px; text-transform: uppercase; color: #999; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">FOOD</a>
        <div class="cart">CART (<span id="cart-count">0</span>)</div>
    </header>

    <!-- Aqui o HTML vai estar vazio no início. O JavaScript vai preenchê-lo! -->
    <main class="product-grid" id="grid-produtos">
    </main>

    <footer>© 2026 FOOD INC</footer>

    <script>
        let cartCount = 0;

        // Função para carregar produtos da Base de Dados (PostgreSQL via Spring Boot)
        async function carregarProdutos() {
            try {
                // Vai ao teu backend buscar os dados
                const resposta = await fetch('/api/produtos');
                const produtos = await resposta.json();
                
                const grid = document.getElementById('grid-produtos');

                // Para cada produto que veio do Postgres, cria o HTML
                produtos.forEach(produto => {
                    const artigo = document.createElement('article');
                    artigo.className = 'product';
                    artigo.onclick = () => addToCart(); // Clicar adiciona ao carrinho

                    artigo.innerHTML = `
                        <div class="product-image">
                            <img src="${produto.imagemUrl}" alt="${produto.nome}">
                        </div>
                        <div class="product-info">
                            <span class="product-name">${produto.nome}</span>
                            <span class="product-price">${produto.preco.toFixed(2)}€</span>
                        </div>
                    `;
                    
                    grid.appendChild(artigo);
                });
            } catch (erro) {
                console.error("Erro ao carregar produtos:", erro);
            }
        }

        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
        }

        // Corre a função mal a página abre
        carregarProdutos();
    </script>
</body>
</html>
